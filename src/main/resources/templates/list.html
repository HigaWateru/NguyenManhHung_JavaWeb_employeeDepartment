<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách nhân viên</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Danh sách nhân viên</h2>
        <a href="/employees/add" class="btn btn-success">Thêm nhân viên mới</a>
    </div>

    <div class="row mb-3">
        <div class="col-md-6">
            <form th:action="@{/employees}" method="get" class="form-inline">
                <input type="hidden" name="sort" th:value="${sort}">
                <input type="hidden" name="direction" th:value="${direction}">
                <input type="text" name="keyword" th:value="${keyword}" class="form-control mr-2" placeholder="Tìm theo tên...">
                <button type="submit" class="btn btn-primary">Tìm kiếm</button>
            </form>
        </div>
    </div>

    <table class="table table-bordered table-striped">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Avatar</th>
            <th>
                <a th:href="@{/employees(page=${currentPage}, keyword=${keyword}, sort='name', direction=${sort == 'name' && direction == 'asc' ? 'desc' : 'asc'})}" class="text-white">
                    Tên
                    <span th:if="${sort == 'name'}" th:text="${direction == 'asc' ? '↑' : '↓'}"></span>
                </a>
            </th>
            <th>
                <a th:href="@{/employees(page=${currentPage}, keyword=${keyword}, sort='age', direction=${sort == 'age' && direction == 'asc' ? 'desc' : 'asc'})}" class="text-white">Tuổi
                    <span th:if="${sort == 'age'}" th:text="${direction == 'asc' ? '↑' : '↓'}"></span>
                </a>
            </th>
            <th>Phòng ban</th>
            <th>Trạng thái</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="emp : ${employees}">
            <td th:text="${emp.id}"></td>
            <td><img th:src="${emp.avatar}" alt="Avatar" style="width: 50px; height: 50px; border-radius: 50%;"></td>
            <td th:text="${emp.name}"></td>
            <td th:text="${emp.age}"></td>
            <td th:text="${emp.department != null ? emp.department.name : 'N/A'}"></td>
            <td>
                <span th:if="${emp.status}" class="badge bg-success text-white">Đang làm việc</span>
                <span th:unless="${emp.status}" class="badge bg-danger text-white">Nghỉ việc</span>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(employees)}">
            <td colspan="6" class="text-center">Không tìm thấy nhân viên nào</td>
        </tr>
        </tbody>
    </table>

    <nav aria-label="Page navigation" th:if="${totalPages > 0}">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-item page-link" th:href="@{/employees(page=${currentPage - 1}, keyword=${keyword}, sort=${sort}, direction=${direction})}">&laquo;</a>
            </li>

            <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}" th:classappend="${currentPage == i} ? 'active'">
                <a class="page-link" th:href="@{/employees(page=${i}, keyword=${keyword}, sort=${sort}, direction=${direction})}" th:text="${i + 1}"></a>
            </li>

            <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                <a class="page-link" th:href="@{/employees(page=${currentPage + 1}, keyword=${keyword}, sort=${sort}, direction=${direction})}">&raquo;</a>
            </li>
        </ul>
    </nav>
</div>
<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
